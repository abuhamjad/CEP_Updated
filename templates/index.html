<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}">

  <title>Python Excel Automator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  
</head>
<body>
<div class="container">

  <!-- Header -->
  <header>
    <div>
      <h1>Python Excel Automator</h1>
      <p>Upload an Excel file to process it with Pandas automation</p>
    </div>
    <button id="theme-toggle" onclick="toggleTheme()">
      <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"/></svg>
      <svg id="icon-sun" class="hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="#facc15"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/></svg>
    </button>
  </header>

  <!-- Upload card -->
  <div class="card" style="margin-bottom:1.5rem">
    <h2 style="margin-bottom:.75rem">Upload Excel File</h2>
    <label style="font-size:.8rem;font-weight:500;color:var(--text-muted)">Select Excel File (.xlsx, .xls)</label>
    <div class="upload-row">
      <input type="file" id="file-input" multiple accept=".xlsx,.xls,.csv" style="display:none" onchange="onFileChange(this)" />
      <button class="btn btn-outline" onclick="document.getElementById('file-input').click()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"/></svg>
        Choose File
      </button>
      <div class="file-chosen hidden" id="file-label">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="#22c55e"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg>
        <span id="file-name"></span>
      </div>
    </div>
  </div>

  <!-- Action buttons -->
  <div class="actions hidden" id="action-row">
    <button class="btn btn-primary btn-lg" id="start-btn" onclick="startProcessing()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      Start Processing
    </button>
    <button class="btn btn-outline btn-lg" onclick="resetAll()">Reset</button>
  </div>

  <!-- Export buttons -->
  <div class="export-row hidden" id="export-row">
    <button class="btn btn-outline" id="pdf-btn" onclick="handlePDF()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
      Export as PDF
    </button>
    <button class="btn btn-outline" onclick="handleExcel()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m.75 12 3 3m0 0 3-3m-3 3v-6m-1.5-9H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg>
      Export as Excel
    </button>
  </div>

  <!-- Report -->
  <div class="report-container hidden" id="report-capture">
    <div class="card table-card">

        <h2 style="margin-bottom:.2rem">
            Circle-wise Affected Hypervisors
        </h2>

        <p id="row-count"
           style="font-size:.75rem;color:var(--text-muted);margin-bottom:.9rem">
           0 count returned
        </p>

        <div class="table-scroll">
            <table id="data-table"></table>
        </div>

    </div>

    <div class="card chart-card">

        <h2 style="margin-bottom:.2rem">
            Circle-wise Nodes Above Threshold
        </h2>

        <p style="font-size:.75rem;color:var(--text-muted);margin-bottom:.9rem">
            Number of hypervisors exceeding 70% memory utilization
        </p>

        <canvas id="chart-canvas"></canvas>

    </div>

</div>

</div>

<!-- Task status popup -->
<div class="bottom-popup" id="task-popup">
  <div class="popup-header">
    <div class="popup-header-left">
      <span id="popup-spinner-wrap"><svg class="spin" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#60a5fa"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/></svg></span>
      <span id="popup-label">Starting…</span>
      <span id="popup-pct" style="font-size:.75rem;color:var(--text-faint)">0%</span>
    </div>
    <div class="popup-header-right">
      <button class="icon-btn" id="collapse-btn" onclick="toggleCollapse()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
      </button>
      <button class="icon-btn" onclick="closeTaskPopup()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
      </button>
    </div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div id="task-list"
       style="
            display:flex;
            flex-direction:column;
            gap:8px;
            padding:12px;
       "></div>
</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
